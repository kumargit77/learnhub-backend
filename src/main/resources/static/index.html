<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to LearnHub LMS</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .welcome-header {
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            color: white;
        }
        .welcome-logo {
            background: linear-gradient(135deg, #4FD1C5, #2B6CB0);
            border-radius: 16px;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .cards-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .portal-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 300px;
            text-decoration: none;
            color: var(--text-main);
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow-xl);
            display: block;
        }
        .portal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 30px -5px rgba(0, 0, 0, 0.2);
        }
        .portal-icon {
            background: #EDF2F7;
            width: 70px;
            height: 70px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .portal-icon svg {
            width: 40px;
            height: 40px;
        }
        .portal-card h2 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .portal-card p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    
    <div>
        <div class="welcome-header">
            <div class="welcome-logo">🎓</div>
            <div>
                <h1 style="font-size: 36px; margin-bottom: 5px;">LearnHub LMS</h1>
                <p style="font-size: 16px; color: #E2E8F0;">Your gateway to knowledge. Choose how you'd like to continue.</p>
            </div>
        </div>

        <div class="cards-container">
            <a href="admin-login.html" class="portal-card">
                <div class="portal-icon">
                    <!-- Shield icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        <polyline points="9 12 11 14 15 10"></polyline>
                    </svg>
                </div>
                <h2>Admin Login</h2>
                <p>Manage Course, track student progress</p>
            </a>

            <a href="student-login.html" class="portal-card">
                <div class="portal-icon">
                    <!-- User Outline icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <h2>Student Login</h2>
                <p>Enroll in course, track student learning</p>
            </a>
        </div>
    </div>

</body>
</html>
