<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - LearnHub</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .auth-icon-green {
            background: #9AE6B4;
            color: #000;
        }
        .signup-link {
            font-size: 14px;
            font-weight: 500;
            margin-top: 20px;
        }
        .signup-link a {
            color: #3182CE;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-icon auth-icon-green">
                <svg width="32" height="32" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C9.243 2 7 4.243 7 7s2.243 5 5 5 5-2.243 5-5-2.243-5-5-5zm0 8c-1.654 0-3-1.346-3-3s1.346-3 3-3 3 1.346 3 3-1.346 3-3 3zm9 11v-1c0-3.309-2.691-6-6-6h-6c-3.309 0-6 2.691-6 6v1h2v-1c0-2.206 1.794-4 4-4h6c2.206 0 4 1.794 4 4v1h2zm-4.707-13.707l-4 4a.999.999 0 01-1.414 0l-2-2 1.414-1.414 1.293 1.293 3.293-3.293 1.414 1.414z" />
                </svg>
            </div>
            <h2>Student Login</h2>
            <p class="subtitle">Access your learning dashboard</p>
            
            <form id="studentLoginForm">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                
                <div class="auth-link-right">
                    <a href="student-reset.html">Forgot Password?</a>
                </div>
                
                <button type="button" onclick="loginStudent()" class="btn-primary" style="background: linear-gradient(to right, #2B6CB0, #48BB78);">Login</button>
            </form>
            
            <div class="signup-link">
                New User? <a href="student-register.html">Sign up</a>
            </div>
            
            <div class="auth-card-footer">
                <a href="index.html" class="back-link">&larr; Back to Welcome</a>
            </div>
        </div>
    </div>
    
   <script>
async function loginStudent() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const res = await fetch('http://localhost:8081/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });

    if (!res.ok) {
        alert("Invalid credentials");
        return;
    }

    const data = await res.json();

    // Save user info for later use
    localStorage.setItem('userId', data.userId);
    localStorage.setItem('role', data.role);
    localStorage.setItem('userName', data.name);

    window.location.href = 'student-dashboard.html';
}
</script>
</body>
</html>
